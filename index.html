<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cohete animación</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* estrellas */
.estrella{
    position:absolute;
    background:white;
    border-radius:50%;
    left:-10px; 
}

/* tamaños, posiciones y velocidades */
.e1{ width:2px; height:2px; top:10%; animation: mover 3s linear infinite; }
.e2{ width:3px; height:3px; top:30%; animation: mover 5s linear infinite; }
.e3{ width:2px; height:2px; top:50%; animation: mover 2.5s linear infinite; }
.e4{ width:4px; height:4px; top:70%; animation: mover 6s linear infinite; }
.e5{ width:3px; height:3px; top:20%; animation: mover 4s linear infinite; }
.e6{ width:2px; height:2px; top:40%; animation: mover 3.5s linear infinite; }
.e7{ width:3px; height:3px; top:65%; animation: mover 5.5s linear infinite; }

@keyframes mover{
    from{ transform: translateX(0); }
    to{ transform: translateX(110vw); }
}

/* COHETE */
.cohete{
    position:absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%) rotate(-90deg);
    width:250px;
}

.cohete img{
    width:100%;
    animation: flotar 3s ease-in-out infinite;
}

@keyframes flotar{
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-6px); }
    100%{ transform: translateY(0px); }
}

</style>
</head>

<body>

<div class="estrella e1"></div>
<div class="estrella e2"></div>
<div class="estrella e3"></div>
<div class="estrella e4"></div>
<div class="estrella e5"></div>
<div class="estrella e6"></div>
<div class="estrella e7"></div>

<div class="cohete">
    <img src="img/cohete space.gif" alt="cohete">
</div>

</body>
</html>
