<html>
<head>
    <title>Animaciones CS3</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        .contenedor{
            width:400px;
            height: 200px;
            border:1px solid black;
            position:relative;/*provoca el centrado del div contenedor*/
            margin: 0 auto;/*provoca el centrado del div contenedor*/
            overflow:hidden;
            background-image: url(img/campo.avif);
            background-size: cover;
        }
        .cuadrito{
            width: 50px;
            height: 50px;
            position:absolute;
            left:-100px;
            top:50px;
            animation: cuadrito 3s infinite;
        }
        .cuadrito2{
            width: 50px;
            height: 50px;
            position:absolute;
            left:-100px;
            top:50px;
            animation: cuadrito2 5s infinite 1s; 
        }
        @keyframes cuadrito{
            0%{
                left:-50px;
                top:150px;
                rotate:0deg;
            }
            50%{
                left:175px;
                top:0px;
                rotate:60deg;
            }
            100%{
                left:400px;
                top:150px;
                rotate:0deg;
            }

        }
        @keyframes cuadrito2{
           0%{
                left:-50px;
                top:0px;
                rotate:0deg;
            }
            50%{
                left:175px;
                top:150px;
                rotate:60deg;
            }
            100%{
                left:400px;
                top:0px;
                rotate:0deg;
            } 
        } 
        .cuadrito img{
            width: 50%;
            height: 50%;
        } 
        .cuadrito2 img{
           width: 50%;
            height: 50%; 
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="cuadrito"> <img src="img/abeja.webp" alt=""></div>
        <div class="cuadrito2"> <img src="img/abeja1.png" alt=""></div>
       
    </div>
</body>
</html>
